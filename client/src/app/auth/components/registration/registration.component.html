
<div class="register-wrapper">
  <div class="register-card">
    <h2>Register</h2>

    <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label>Username:</label>
        <input type="text" class="form-control" formControlName="username" />
      </div>

      <div class="mb-3">
        <label>Password:</label>
        <input type="password" class="form-control" formControlName="password" />
      </div>

      <div class="mb-3">
        <label>Role:</label>
        <select class="form-select" formControlName="role" (change)="onRoleChange($event)">
          <option value="">Select Role</option>
          <option value="DOCTOR">Doctor</option>
          <option value="PATIENT">Patient</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Full Name:</label>
        <input type="text" class="form-control" formControlName="fullName" />
      </div>

      <div class="mb-3">
        <label>Contact Number:</label>
        <input type="text" class="form-control" formControlName="contactNumber" />
      </div>

      <div class="mb-3">
        <label>Email:</label>
        <input type="email" class="form-control" formControlName="email" />
      </div>

      <!-- Doctor Fields -->
      <div *ngIf="selectedRole === 'DOCTOR'">
        <div class="mb-3">
          <label>Specialty:</label>
          <input type="text" class="form-control" formControlName="specialty" />
        </div>

        <div class="mb-3">
          <label>Years Of Experience:</label>
          <input type="number" class="form-control" formControlName="yearsOfExperience" />
        </div>
      </div>

      <!-- Patient Fields -->
      <div *ngIf="selectedRole === 'PATIENT'">
        <div class="mb-3">
          <label>Date Of Birth:</label>
          <input type="date" class="form-control" formControlName="dateOfBirth" />
        </div>

        <div class="mb-3">
          <label>Address:</label>
          <input type="text" class="form-control" formControlName="address" />
        </div>
      </div>

      <button class="btn btn-dark w-100 mt-2" type="submit">
        Register
      </button>

    </form>
  </div>
</div>
